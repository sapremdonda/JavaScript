<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Time Tracker Web App</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/components.css">
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://unpkg.com/sweetalert/dist/sweetalert.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body data-theme="light">

    <header class="top-nav">
        <div class="nav-brand">
            <i class="fas fa-clock"></i>
            <span>Time Tracker</span>
        </div>
        <div class="nav-actions">
            <button id="view-dashboard-btn" class="btn-nav"><i class="fas fa-chart-pie"></i> Dashboard</button>
            <button id="view-tracker-btn" class="btn-nav active"><i class="fas fa-list-check"></i> Tracker</button>
            <button id="import-btn" class="btn-nav"><i class="fas fa-file-import"></i> Import</button>
            <button id="export-btn" class="btn-nav"><i class="fas fa-file-export"></i> Export</button>
            <button id="theme-toggle" aria-label="Toggle Theme"><i class="fas fa-moon"></i></button>
        </div>
    </header>

    <div class="filter-bar" id="tracker-filters">
        <div class="filter-group">
            <label for="filter-project">Project:</label>
            <select id="filter-project">
                <option value="All">All Projects</option>
            </select>
        </div>
        <div class="filter-group">
            <input type="text" id="filter-search" placeholder="Search tasks...">
        </div>
        <div class="filter-group">
            <button id="manual-time-btn" class="btn-outline"><i class="fas fa-plus"></i> Manual Log</button>
        </div>
    </div>

    <div class="main-container">
        <aside class="sidebar">
            <div class="timer-widget" id="timer-widget">
                <h3>Active Timer</h3>
                <div class="timer-display" id="timer-display">00:00:00</div>
                <div class="timer-details" id="timer-details">No active task</div>
                <button id="stop-timer-btn" class="btn-danger" style="display: none; width: 100%; margin-top: 10px;"><i class="fas fa-stop"></i> Stop Timer</button>
            </div>

            <hr class="divider">

            <h3>Add Project</h3>
            <form id="add-project-form" novalidate>
                <div class="form-group">
                    <input type="text" id="proj-name" placeholder="Project name" required>
                    <span class="error-text">Required</span>
                </div>
                <div class="form-group">
                    <label>Color Tag</label>
                    <input type="color" id="proj-color" value="#4285f4" class="color-picker">
                </div>
                <button type="submit" class="btn-primary">Add Project</button>
            </form>

            <hr class="divider">

            <h3>Start Task</h3>
            <form id="start-task-form" novalidate>
                <div class="form-group">
                    <select id="task-project-select" required>
                        <option value="" disabled selected>Select Project...</option>
                    </select>
                    <span class="error-text">Select a project</span>
                </div>
                <div class="form-group">
                    <input type="text" id="task-name" placeholder="What are you working on?" required>
                    <span class="error-text">Required</span>
                </div>
                <button type="submit" class="btn-success"><i class="fas fa-play"></i> Start Timer</button>
            </form>
        </aside>

        <div class="content-area" id="main-content">
            <div id="tracker-view">
                <div class="column-header">
                    <h2>Recent Time Logs</h2>
                </div>
                <div class="task-list" id="logs-list"></div>
            </div>

            <div id="dashboard-view" style="display: none;">
                <div class="dashboard-grid">
                    <div class="chart-container">
                        <h3>Weekly Summary</h3>
                        <canvas id="weeklyChart"></canvas>
                    </div>
                    <div class="chart-container">
                        <h3>Project Breakdown</h3>
                        <canvas id="projectChart"></canvas>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div id="manual-modal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h3>Add Manual Time Log</h3>
                <button class="close-modal"><i class="fas fa-xmark"></i></button>
            </div>
            <div class="modal-body">
                <form id="manual-log-form">
                    <div class="form-group">
                        <label>Project</label>
                        <select id="manual-proj" required></select>
                    </div>
                    <div class="form-group">
                        <label>Task Name</label>
                        <input type="text" id="manual-task" required>
                    </div>
                    <div class="flex-gap">
                        <div class="form-group flex-1">
                            <label>Start Time</label>
                            <input type="datetime-local" id="manual-start" required>
                        </div>
                        <div class="form-group flex-1">
                            <label>End Time</label>
                            <input type="datetime-local" id="manual-end" required>
                        </div>
                    </div>
                    <div class="form-group">
                        <label>Notes (Optional)</label>
                        <textarea id="manual-notes"></textarea>
                    </div>
                    <button type="submit" class="btn-primary">Save Log</button>
                </form>
            </div>
        </div>
    </div>

    <div id="export-modal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h3>Export Time Logs</h3>
                <button class="close-modal"><i class="fas fa-xmark"></i></button>
            </div>
            <div class="modal-body">
                <p class="settings-hint">Export your data to a CSV file to open in Excel or Google Sheets.</p>
                <button id="confirm-export-btn" class="btn-primary"><i class="fas fa-download"></i> Download CSV</button>
            </div>
        </div>
    </div>

    <div id="import-modal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h3>Import CSV</h3>
                <button class="close-modal"><i class="fas fa-xmark"></i></button>
            </div>
            <div class="modal-body">
                <form id="import-form">
                    <div class="form-group">
                        <label>Upload previously exported CSV</label>
                        <input type="file" id="import-file" accept=".csv" required class="file-input">
                    </div>
                    <button type="submit" class="btn-primary"><i class="fas fa-upload"></i> Import Data</button>
                </form>
            </div>
        </div>
    </div>

    <script type="module" src="js/app.js"></script>
</body>
</html>
